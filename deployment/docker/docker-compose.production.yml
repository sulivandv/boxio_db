# Boxio License Server - Docker Compose production
services:
  boxio-license-server:
    build: ../../license_server
    container_name: boxio-license-server
    restart: unless-stopped
    env_file:
      - ../../license_server/.env
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
